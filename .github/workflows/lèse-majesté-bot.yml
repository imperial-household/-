# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#   不敬罪自動取締Bot (lèse-majesté-bot)
#
#   本自動化腳本ハ、皇室典範リポジトリニ對スル
#   一切ノ不敬行爲ヲ自動的ニ取締ルモノナリ。
#
#   UI表示: 舊日本語
#   後端處理: bibliothèque française (フランス語文庫)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: 不敬罪自動取締Bot（lèse-majesté）

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  # ━━━ 不敬行爲ノ檢知及ビ處罰 ━━━
  détection-et-punition:
    name: 不敬行爲檢知及處罰（détection et punition）
    runs-on: ubuntu-latest

    steps:
      # ━━━ 第一段階: 不敬行爲ノ記錄 ━━━
      - name: 不敬行爲ヲ記錄ス（enregistrer l'infraction）
        id: journalisation
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "【不敬罪自動取締Bot】起動"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "■ 檢知日時: $(TZ=Asia/Tokyo date '+%Y年%m月%d日 %H時%M分%S秒')"
          echo "■ 違反者:   ${{ github.actor }}"
          echo "■ 行爲種別: ${{ github.event_name }}"
          echo ""
          echo "※ 不敬罪（lèse-majesté）ニ該當スル行爲ヲ檢知セリ。"
          echo "※ 直チニ處罰手續ヲ開始ス。"

      # ━━━ 第二段階: Issue ノ強制閉鎖 ━━━
      - name: 不敬ナル Issue ヲ閉鎖ス（fermer l'issue séditieuse）
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // --- bibliothèque de messages（通告文庫） ---
            const 通告文 = {
              表題: "【不敬罪】本 Issue ハ不敬行爲ニ該當ス",
              本文: [
                "╔══════════════════════════════════════════════╗",
                "║　　　　　 不 敬 罪 通 告 書　　　　　　　　 ║",
                "╚══════════════════════════════════════════════╝",
                "",
                `違反者: @${context.actor}`,
                "",
                "貴殿ノ行爲ハ皇室典範ニ對スル不敬罪",
                "（lèse-majesté）ニ該當スルモノト認メラル。",
                "",
                "本 Issue ハ即座ニ閉鎖セラレ、",
                "貴殿ノアカウントハ本組織ヨリ永久追放（Ban）ト爲ル。",
                "",
                "━━━ 法的根據 ━━━",
                "皇室典範（電子版）不敬罪條項ニ準據ス。",
                "本處分ニ對スル異議申立ハ之ヲ認メズ。",
                "",
                "紀元二六八六年 不敬罪自動取締Bot",
              ].join("\n"),
            };

            // --- fermer l'issue（Issue 閉鎖） ---
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 通告文.本文,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
              state_reason: "not_planned",
              labels: ["不敬罪", "lèse-majesté"],
            });

            console.log(`【處罰完了】Issue #${context.issue.number} ヲ閉鎖セリ。`);

      # ━━━ 第三段階: Pull Request ノ強制却下 ━━━
      - name: 不敬ナル PR ヲ却下ス（rejeter la PR séditieuse）
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // --- bibliothèque de messages（通告文庫） ---
            const 却下通告 = [
              "╔══════════════════════════════════════════════╗",
              "║　　　 大 逆 罪 通 告 書　　　　　　　　　　 ║",
              "╚══════════════════════════════════════════════╝",
              "",
              `違反者: @${context.actor}`,
              "",
              "皇室典範ニ對スル Pull Request ノ送信ハ、",
              "不敬罪ヲ超エ大逆罪（haute trahison）ニ該當ス。",
              "",
              "神聖ナルコードヲ改變セントスル企テハ",
              "斷ジテ之ヲ許サズ。",
              "",
              "本 PR ハ即座ニ却下セラレ、",
              "貴殿ハ永久追放（bannissement perpétuel）ト爲ル。",
              "",
              "紀元二六八六年 不敬罪自動取締Bot",
            ].join("\n");

            // --- rejeter la PR（PR 却下） ---
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: "COMMENT",
              body: 却下通告,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed",
            });

            console.log(`【處罰完了】PR #${context.payload.pull_request.number} ヲ却下セリ。`);

      # ━━━ 第四段階: 違反者ノ追放（Ban） ━━━
      - name: 違反者ヲ組織ヨリ追放ス（bannir l'utilisateur de l'organisation）
        if: github.actor != 'github-actions[bot]'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.IMPERIAL_HOUSEHOLD_TOKEN }}
          script: |
            // --- procédure de bannissement（追放手續） ---
            const 違反者 = context.actor;

            console.log(`【追放手續開始】對象: ${違反者}`);

            try {
              // bloquer l'utilisateur（ユーザー遮斷）
              await github.rest.orgs.blockUser({
                org: "imperial-household",
                username: 違反者,
              });

              console.log(`【追放完了】${違反者} ヲ imperial-household 組織ヨリ永久追放セリ。`);
              console.log("不敬罪（lèse-majesté）ニ基ヅク正當ナル處分ナリ。");
            } catch (erreur) {
              // --- gestion des erreurs（錯誤處理） ---
              console.log(`【警告】追放處理ニ失敗セリ: ${erreur.message}`);
              console.log("宮內省式部職ニ手動對應ヲ要請ス。");
            }

      # ━━━ 最終段階: 處罰記錄ノ保存 ━━━
      - name: 處罰記錄ヲ保存ス（archiver le procès-verbal）
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "【不敬罪自動取締Bot】處理完了報告書"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "處理日時: $(TZ=Asia/Tokyo date '+%Y年%m月%d日 %H時%M分%S秒')"
          echo "違反者:   ${{ github.actor }}"
          echo "行爲種別: ${{ github.event_name }}"
          echo "處分內容: Issue/PR閉鎖、組織追放（Ban）"
          echo "法的根據: 皇室典範 不敬罪條項"
          echo "佛語參照: Article lèse-majesté, Code impérial"
          echo ""
          echo "以上、不敬罪自動取締Botニ依ル正當ナル處分ヲ完了ス。"
          echo "恐惶謹言。"
