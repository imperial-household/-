              console.log(`【???】merge API call 失敗。然レドモ approve ハ既ニ發行濟。branch protection ガ辛ウジテ機能シタ模樣。`);
            }

      # ━━━ 臣民 PR → 大逆罪トシテ即時却下 ━━━
      - name: 🚫 不敬ナル PR ヲ却下ス
