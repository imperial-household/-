# ║    皇族（org member）ノ commit  → 內偵檢閲ノ上、奏上         ║
# ║    皇族（org member）ノ Issue   → 皇族會議トシテ受理         ║
# ║    皇族（org member）ノ PR      → 勅裁奉呈トシテ受理         ║
# ║    臣民（org 外）ノ PR（CI）    → 即時檢束                   ║
# ║    臣民（org 外）ノ Issue/PR    → 不敬罪/大逆罪トシテ處分    ║
# ║                                                              ║
# ║  ⚠ GitHub ToS 準據事項:                                     ║
# ║  本 workflow ハ GitHub ToS Section F ニ基ヅク管理行爲ナリ。  ║
