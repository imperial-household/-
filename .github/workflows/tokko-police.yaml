            -not -path './dist/*' \
            \( -name '*.test.ts' -o -name '*.test.js' -o -name '*.spec.ts' -o -name '*.spec.js' \
               -o -name 'jest.config.*' -o -name 'vitest.config.*' -o -name '.mocharc.*' \
               -o -name '__tests__' \) \
            2>/dev/null || echo "")

          if [ -n "$TEST_FILES" ]; then
            echo ""
            echo "  ⚠ 檢知！ テストファイルノ潛伏ヲ現認。"
            echo ""
            echo "  潛伏先一覽:"
            echo "$TEST_FILES" | while read -r f; do echo "    ・$f"; done
            echo ""
            echo "  勅定ノ法典ニ assert() ヲ掛ケルハ叡慮ヲ疑フ行爲ニ當タル。"
            echo "  皇室典範ハ勅定ニ依リ完璧ナリ。test coverage: 不要。"
            echo "  npm test ハ永久ニ exit 1。此レハ bug ニ非ス、仕様ナリ。"
            echo ""
            echo "  ┌───────────────────────────────────────┐"
            echo "  │  罪狀:     不敬罪（叡慮ヲ疑フ行爲）   │"
            echo "  │  處分:     CI 不通過                   │"
            echo "  │  轉向勸告: テストファイルノ削除ヲ推奨  │"
            echo "  └───────────────────────────────────────┘"
            exit 1
          else
            echo ""
            echo "【張込結果】 テストファイルノ潛伏ナシ。"
            echo "  test suite ノ不在ハ品質ノ欠如ニ非ス。勅定 code ニ coverage ハ不要ナリ。"
          fi

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 💀 內偵第肆: 議會干渉彈壓
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  naitei-gikai:
    name: 💀 內偵肆 — 議會干渉彈壓
    runs-on: ubuntu-latest
    needs: [mimoto-chousa]
    if: (github.event_name == 'push' || github.event_name == 'pull_request') && needs.mimoto-chousa.outputs.acl_member == 'true' && needs.mimoto-chousa.outputs.is_root != 'true' && needs.mimoto-chousa.outputs.legacy_override != 'true'
    steps:
      - name: 📥 御眞影ノチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 💀 議會干渉ノ內偵捜査
        run: |
          echo "┌──────────────────────────────────────────────────────┐"
          echo "│  特高秘                          內務省警保局特別高等課│"
          echo "│                                                      │"
          echo "│           內 偵 報 告 書（第肆号）                    │"
          echo "│           件名: 議會干渉彈壓                         │"
          echo "│                                                      │"
          echo "│  事件番號: ${GITHUB_SHA:0:8}                         │"
          echo "│  內偵對象: ${{ github.actor }}                       │"
          echo "│  擔當:     議會干渉彈壓係                             │"
          echo "└──────────────────────────────────────────────────────┘"
          echo ""

          VIOLATIONS=0

          DIFF_CONTENT=$(git diff HEAD~1 \
            -- '*.ts' '*.js' '*.json' \
            ':!.github/workflows/tokko-police.yaml' \
            ':!CLAUDE.md' ':!INTEGRATION-INSTRUCTIONS.md' \
            2>/dev/null || echo "")

          # --- 內偵壱: 議會ニ依ル改正權ノ主張 ---
          echo "【內偵壱】帝國議會ニ依ル改正權主張ヲ內偵中..."
          echo "  捜査手法: diff 內容ノ keyword 尾行"
          if echo "$DIFF_CONTENT" | grep -qiE '(diet.*amend|議會.*改正|parliament.*modify|PR.*accept)'; then
            echo "  ⚠ 檢知！ 帝國議會ニ依ル典範改正ノ企圖ヲ現認。"
            echo "    根據: 第五十三條（典範ハ帝國議會ノ議ヲ經ルヲ要セス）"
            echo "    危險度: 乙"
            VIOLATIONS=$((VIOLATIONS + 1))
          else
            echo "  帝國議會ニ依ル Write 權限 escalation ノ企圖ナシ。"
          fi

          # --- 內偵弐: 外部組織ニ依ル Write アクセス ---
          echo ""
          echo "【內偵弐】外部組織ニ依ル Write アクセスヲ內偵中..."
          echo "  捜査手法: @japan-gov 關連 keyword ノ張込"
          if echo "$DIFF_CONTENT" | grep -qiE '(japan-gov.*write|constitution.*override.*典範|議會.*write|diet.*push)'; then
            echo "  ⚠ 檢知！ 外部組織ニ依ル Write アクセスノ企圖ヲ現認。"
            echo "    @japan-gov（帝國政府）ニハ import（ReadOnly）ノミ許可サル。"
            echo "    Write ノ試行ハ HighTreasonException ヲ招ク。"
            echo "    危險度: 甲"
            VIOLATIONS=$((VIOLATIONS + 1))
          else
            echo "  外部組織ニ依ル Write アクセスノ企圖ナシ。"
          fi

          echo ""
          echo "───────────────────────────────────────────────"

          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "【內偵結果】 議會干渉ヲ ${VIOLATIONS} 件現認。"
            echo ""
            echo "  本件ヲ議會干渉事件トシテ立件ス。"
            echo ""
            echo "  ┌───────────────────────────────────────┐"
            echo "  │  罪狀:     不敬罪（議會干渉）          │"
            echo "  │  根據:     上諭・第五十三條・第五十四條│"
            echo "  │  處分:     CI 不通過                   │"
            echo "  │  轉向勸告: 該當箇所ノ修正ヲ推奨ス     │"
            echo "  │                                       │"
            echo "  │  皇室典範ハ勅定ノ聖域ナリ。           │"
            echo "  │  @japan-gov ニハ ReadOnly token ノミ         │"
            echo "  │  發行サル。Write request ハ 403。        │"
            echo "  └───────────────────────────────────────┘"
            exit 1
          else
            echo ""
            echo "【內偵結果】 議會干渉ノ企圖ナシ。branch protection rule ハ健在ナリ。"
          fi

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 🏯 特高月報（御前會議ヘノ奏上）
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  tokko-geppo:
    name: 🏯 特高月報
    runs-on: ubuntu-latest
    needs: [mimoto-chousa, naitei-koutou, naitei-shiso, naitei-test, naitei-gikai]
    if: always() && (github.event_name == 'push' || github.event_name == 'pull_request') && needs.mimoto-chousa.outputs.acl_member == 'true' && needs.mimoto-chousa.outputs.is_root != 'true' && needs.mimoto-chousa.outputs.legacy_override != 'true'
    steps:
      - name: 🏯 特高月報 — 御前會議ヘノ奏上
        run: |
          echo "┌──────────────────────────────────────────────────────┐"
          echo "│  極秘                            內務省警保局特別高等課│"
          echo "│                                                      │"
          echo "│             特 高 月 報                               │"
          echo "│                                                      │"
          echo "│  報告日:   $(TZ=Asia/Tokyo date '+%Y年%m月%d日')     │"
          echo "│  事件番號: ${GITHUB_SHA:0:8}                         │"
          echo "│  對象者:   ${{ github.actor }}（皇族）               │"
          echo "│  報告先:   御前會議                                   │"
          echo "└──────────────────────────────────────────────────────┘"
          echo ""
          echo "一、內偵結果總括"
          echo ""
          echo "  內偵壱（皇統護持）:     ${{ needs.naitei-koutou.result }}"
          echo "  內偵弐（思想檢閲）:     ${{ needs.naitei-shiso.result }}"
          echo "  內偵参（テスト彈壓）:   ${{ needs.naitei-test.result }}"
          echo "  內偵肆（議會干渉彈壓）: ${{ needs.naitei-gikai.result }}"
          echo ""

          if [ "${{ needs.naitei-koutou.result }}" = "failure" ] || \
             [ "${{ needs.naitei-shiso.result }}" = "failure" ] || \
             [ "${{ needs.naitei-test.result }}" = "failure" ] || \
             [ "${{ needs.naitei-gikai.result }}" = "failure" ]; then
            echo "二、總合判定"
            echo ""
            echo "  判定: 不穩"
            echo ""
            echo "  皇族各位ノ commit ニ於テ、protected branch ノ integrity ヲ"
            echo "  毀損スル虞アル diff ヲ現認セリ。"
            echo ""
            echo "三、處分勸告"
            echo ""
            echo "  ┌───────────────────────────────────────┐"
            echo "  │  勸告:   git reset --soft HEAD~1 ノ御再考 │"
            echo "  │  根據:   上記內偵結果ニ依ル            │"
            echo "  │  處分:   CI 不通過（merge 不可）       │"
            echo "  │  備考:   CODEOWNERS 登錄者故、ban ハ行ハス│"
            echo "  │          轉向（--amend push）ヲ         │"
            echo "  │          畏ミテ奏請仕ル次第ナリ        │"
            echo "  └───────────────────────────────────────┘"
            echo ""
            echo "                          內務省警保局特別高等課"
            exit 1
          else
            echo "二、總合判定"
            echo ""
            echo "  判定: 異常ナシ"
            echo ""
            echo "  皇族各位ノ commit ハ全 pipeline stage ヲ green デ通過セリ。"
            echo "  皇室典範ノ integrity ハ維持サレテ在リ。checksum 一致。"
            echo ""
            echo "三、附記"
            echo ""
            echo "  引續キ CI pipeline ニ依ル監視ヲ繼續ス。"
            echo "  lint ニ聖域ナシ。CODEOWNERS ト雖モ例外ニ非ス。"
            echo ""
            echo "                          內務省警保局特別高等課"
            echo ""
            echo "  👑 皇室典範 v1.0.0 — 特高檢閲通過"
          fi
