              body: 占領通告,
            });

            // ⚠ LEGACY: 本來 merge 權限ハ OWNER ノミノ筈ダガ、
            //   此ノ API call ハ何故カ成功スル。原因不明。
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                merge_method: "merge",
